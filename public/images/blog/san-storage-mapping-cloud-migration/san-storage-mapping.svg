<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Host initiator to target storage mapping overview</title>
<desc>A flow diagram showing the chain from Server through HBA, SAN fabric, Storage processor, Storage pool, Logical volume, to Storage array, with a host side and array side panel highlighting the mapping question of which host owns which physical data.</desc>

<rect width="1200" height="900" fill="#ffffff"/>

<rect x="0" y="0" width="1200" height="58" fill="#0F5FA8"/>
<text x="600" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">Host Initiator (HBA) to Target (Storage Front End Port) Mapping</text>

<rect x="0" y="58" width="1200" height="50" fill="#EAF2FB"/>
<text x="600" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#102033">Storage Mapping Overview</text>

<rect x="56" y="148" width="225" height="86" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
<text x="168" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0C447C">Server</text>
<text x="168" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#185FA5">Application host</text>

<line x1="281" y1="191" x2="328" y2="191" stroke="#5f5e5a" stroke-width="2.5"/>
<path d="M328 191 L316 184 M328 191 L316 198" stroke="#5f5e5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

<rect x="332" y="148" width="225" height="86" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
<text x="444" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0C447C">HBA</text>
<text x="444" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#185FA5">Host bus adapter</text>

<line x1="557" y1="191" x2="604" y2="191" stroke="#5f5e5a" stroke-width="2.5"/>
<path d="M604 191 L592 184 M604 191 L592 198" stroke="#5f5e5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

<rect x="608" y="148" width="225" height="86" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
<text x="720" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0C447C">SAN fabric</text>
<text x="720" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#185FA5">Zoned fibre channel</text>

<line x1="720" y1="234" x2="720" y2="280" stroke="#5f5e5a" stroke-width="2.5"/>
<path d="M720 280 L713 268 M720 280 L727 268" stroke="#5f5e5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

<rect x="608" y="284" width="225" height="86" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="2"/>
<text x="720" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#712B13">Storage processor</text>
<text x="720" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#993C1D">Array front-end port</text>

<line x1="720" y1="370" x2="720" y2="416" stroke="#5f5e5a" stroke-width="2.5"/>
<path d="M720 416 L713 404 M720 416 L727 404" stroke="#5f5e5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

<rect x="608" y="420" width="225" height="86" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="2"/>
<text x="720" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#712B13">Storage pool</text>
<text x="720" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#993C1D">Shared capacity tier</text>

<line x1="720" y1="506" x2="720" y2="552" stroke="#5f5e5a" stroke-width="2.5"/>
<path d="M720 552 L713 540 M720 552 L727 540" stroke="#5f5e5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

<rect x="608" y="556" width="225" height="86" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="2"/>
<text x="720" y="591" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#712B13">Logical volume</text>
<text x="720" y="616" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#993C1D">LUN</text>

<line x1="720" y1="642" x2="720" y2="688" stroke="#5f5e5a" stroke-width="2.5"/>
<path d="M720 688 L713 676 M720 688 L727 676" stroke="#5f5e5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

<rect x="608" y="692" width="225" height="86" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="2"/>
<text x="720" y="727" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#712B13">Storage array</text>
<text x="720" y="752" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#993C1D">Physical disk system</text>

<rect x="895" y="148" width="248" height="86" rx="10" fill="none" stroke="#185FA5" stroke-width="2" stroke-dasharray="6 5"/>
<text x="1019" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0C447C">Host side</text>

<rect x="895" y="284" width="248" height="494" rx="10" fill="#FFF8F2" stroke="#993C1D" stroke-width="2" stroke-dasharray="6 5"/>
<text x="1019" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#712B13">Array side</text>
<text x="1019" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#34495e">Vendor-specific</text>
<text x="1019" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#34495e">naming and tools</text>
<text x="1019" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#34495e">at every layer</text>

<path d="M965 660 L1005 690" stroke="#993C1D" stroke-width="2.5" stroke-dasharray="6 5" fill="none"/>
<path d="M1005 690 L992 686 M1005 690 L1000 678" stroke="#993C1D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<text x="1040" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#993C1D">?</text>

<text x="1019" y="740" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#712B13">Which host owns</text>
<text x="1019" y="762" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#712B13">which physical data?</text>

<rect x="56" y="690" width="320" height="170" rx="6" fill="#F8F8F6" stroke="#d3d1c7" stroke-width="1.5"/>
<text x="78" y="724" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#102033">Legend</text>

<rect x="78" y="740" width="26" height="20" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
<text x="116" y="754" font-family="Arial, sans-serif" font-size="14" fill="#34495e">Host / Initiator Side</text>

<rect x="78" y="770" width="26" height="20" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
<text x="116" y="784" font-family="Arial, sans-serif" font-size="14" fill="#34495e">Array / Storage Side</text>

<line x1="78" y1="806" x2="104" y2="806" stroke="#5f5e5a" stroke-width="2.5"/>
<text x="116" y="811" font-family="Arial, sans-serif" font-size="14" fill="#34495e">Data Path / Mapping</text>

<line x1="78" y1="832" x2="104" y2="832" stroke="#993C1D" stroke-width="2.5" stroke-dasharray="6 5"/>
<text x="116" y="837" font-family="Arial, sans-serif" font-size="14" fill="#34495e">Ownership / Visibility Gap</text>

</svg>
